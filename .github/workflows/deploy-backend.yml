name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/contracts/**'
      - 'patches/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.dockerignore'
      - 'apps/infra/docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    env:
      CTE_ENV_DIR: /opt/cte/env
    steps:
      - uses: actions/checkout@v7
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Start infrastructure
        run: >-
          docker compose --env-file "$CTE_ENV_DIR/infra.env"
          -f apps/infra/docker-compose.yml up -d --wait postgres nats
      - name: Build backend and migrator
        run: >-
          docker compose --env-file "$CTE_ENV_DIR/infra.env"
          -f apps/infra/docker-compose.yml build backend migrate
      - name: Migrate backend database
        run: >-
          docker compose --env-file "$CTE_ENV_DIR/infra.env"
          -f apps/infra/docker-compose.yml run --rm --no-deps migrate
      - name: Deploy backend
        run: >-
          docker compose --env-file "$CTE_ENV_DIR/infra.env"
          -f apps/infra/docker-compose.yml up -d --no-deps --wait --wait-timeout 120 backend
      - name: Remove old images
        run: docker image prune -f
