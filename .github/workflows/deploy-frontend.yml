name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.dockerignore'
      - 'apps/infra/docker-compose.yml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    env:
      CTE_ENV_DIR: /opt/cte/env
    steps:
      - uses: actions/checkout@v7
      - name: Build and deploy frontend
        run: >-
          docker compose --env-file "$CTE_ENV_DIR/infra.env"
          -f apps/infra/docker-compose.yml
          up -d --build --no-deps --wait --wait-timeout 120 frontend
      - name: Remove old images
        run: docker image prune -f
