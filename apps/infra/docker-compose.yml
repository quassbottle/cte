name: cte

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: cte
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: postgres
    ports:
      - "5765:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - cte-network

  nats:
    image: nats:2.10
    command: -js -m 8222 -sd /data/jetstream
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats_data:/data/jetstream
    networks:
      - cte-network

  backend:
    image: cte-backend:local
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ${CTE_ENV_DIR:-/opt/cte/env}/backend.env
    environment:
      PORT: 3000
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3000}:3000"
    depends_on:
      - postgres
      - nats
    networks:
      - cte-network

  frontend:
    image: cte-frontend:local
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    env_file:
      - ${CTE_ENV_DIR:-/opt/cte/env}/frontend.env
    environment:
      BACKEND_API_URL: http://backend:3000
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 3000
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:3000"
    depends_on:
      - backend
    networks:
      - cte-network

volumes:
  postgres_data:
  nats_data:

networks:
  cte-network:
    name: cte-network
